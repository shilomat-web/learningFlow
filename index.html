<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2ecc8b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="מרכז למידה">
<link rel="manifest" href="manifest.json">
<title>מרכז למידה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#2ecc8b;--gl:#e8f8f2;--gm:#c0eedd;--gd:#1aad6e;
  --bg:#f5f5f3;--white:#fff;--border:#e8e8e5;
  --txt:#1a1a1a;--sec:#888;--muted:#bbb;
  --red:#e74c3c;--amber:#f39c12;--sidebar:200px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --r:12px;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;overflow-x:hidden}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
#auth-screen.hidden{display:none}
.auth-box{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:380px;max-width:92vw;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:right}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-bottom:28px}
.logo-icon{width:40px;height:40px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.auth-logo h1{font-size:22px;font-weight:700}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px}
.auth-tab{flex:1;padding:9px;text-align:center;font-size:14px;cursor:pointer;border-radius:7px;transition:all .15s;color:var(--sec)}
.auth-tab.active{background:var(--white);color:var(--txt);font-weight:500;box-shadow:var(--shadow)}
.auth-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px;text-align:right}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.sb-logo-row h2{font-size:15px;font-weight:700}
.sb-logo p{font-size:11px;color:var(--sec);margin-top:2px;text-align:right}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--sec);transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--txt)}
.nav-item.active{background:var(--gl);color:var(--g);font-weight:500}
.nav-item svg{width:16px;height:16px}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}
.user-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);font-size:13px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.logout-btn{margin-right:auto;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer}

/* ── MAIN ── */
#main{margin-right:var(--sidebar);flex:1;padding:32px 40px;min-height:100vh}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.page-title h1{font-size:26px;font-weight:700}
.page-title p{font-size:13px;color:var(--sec);margin-top:3px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-family:'Heebo',sans-serif;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--g);color:#fff}
.btn-ghost{background:transparent;color:var(--sec);border:1px solid var(--border)}

/* ── DASHBOARD STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:right}
.stat-label{font-size:12px;color:var(--sec);margin-bottom:8px}
.stat-value{font-size:24px;font-weight:700}

/* ── AI CHAT PANEL ── */
#ai-fab{position:fixed;bottom:100px;left:24px;width:54px;height:54px;border-radius:50%;background:var(--g);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(46,204,139,.55);z-index:9000;display:flex;align-items:center;justify-content:center}
#ai-panel{position:fixed;bottom:0;left:0;width:380px;height:560px;max-width:100vw;max-height:85vh;background:var(--white);border-radius:0 20px 0 0;box-shadow:4px -4px 32px rgba(0,0,0,.15);z-index:8999;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s}
#ai-panel.open{transform:translateY(0)}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6}
.ai-msg.user{background:var(--g);color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.ai-msg.bot{background:var(--bg);color:var(--txt);align-self:flex-start;border-radius:14px 14px 14px 4px;border:1px solid var(--border)}
.ai-msg.thinking{color:var(--sec);font-style:italic}
.ai-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.ai-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;outline:none;direction:rtl;font-family:inherit}
.ai-send{width:38px;height:38px;border-radius:50%;background:var(--g);color:#fff;border:none;cursor:pointer}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:28px;width:460px;max-width:100%;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.fg{margin-bottom:16px;text-align:right}
.fg label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.fc{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;direction:rtl}

/* ── CARDS & LISTS ── */
.exam-card, .log-row, .task-row{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.task-circle{width:20px;height:20px;border-radius:50%;border:2px solid var(--g);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:white}
.task-circle.done{background:var(--g)}

@media(max-width:640px){
  #sidebar{display:none}
  #main{margin-right:0;padding:16px 14px 80px}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo"><h1>מרכז למידה</h1><div class="logo-icon">📚</div></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">כניסה</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">הרשמה</div>
    </div>
    <div id="auth-login">
      <div class="fg"><label>שם משתמש</label><input class="fc" id="l-user"></div>
      <div class="fg"><label>סיסמה</label><input class="fc" id="l-pass" type="password"></div>
      <div class="auth-err" id="l-err"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">כניסה</button>
    </div>
    <div id="auth-register" style="display:none">
      <div class="fg"><label>שם משתמש</label><input class="fc" id="r-user"></div>
      <div class="fg"><label>סיסמה</label><input class="fc" id="r-pass" type="password"></div>
      <div class="auth-err" id="r-err"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doRegister()">הרשמה</button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-row"><h2>מרכז למידה</h2><div class="logo-icon" style="width:32px;height:32px;font-size:16px">📚</div></div>
  </div>
  <nav id="sidebar-nav">
    <div class="nav-item active" onclick="showPage('dashboard')"><span>ראשי</span></div>
    <div class="nav-item" onclick="showPage('subjects')"><span>נושאים</span></div>
    <div class="nav-item" onclick="showPage('tasks')"><span>משימות</span></div>
    <div class="nav-item" onclick="showPage('exams')"><span>מבחנים</span></div>
    <div class="nav-item" onclick="showPage('archive')"><span>ארכיון</span></div>
    <div class="nav-item" onclick="showPage('studytime')"><span>זמן לימוד</span></div>
  </nav>
  <div class="user-badge">
    <button class="logout-btn" onclick="doLogout()">יציאה</button>
    <span id="sb-username"></span>
    <div class="user-avatar" id="sb-avatar"></div>
  </div>
</div>

<div id="main">
  <div id="page-dashboard" class="page active">
    <div class="page-header"><div class="page-title"><h1>ראשי</h1><p id="dash-date"></p></div></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">נושאים</div><div class="stat-value" id="s-subjects">0</div></div>
    </div>
  </div>

  <div id="page-subjects" class="page">
    <div class="page-header"><button class="btn btn-primary" onclick="openModal('m-subject')">+ נושא חדש</button><div class="page-title"><h1>נושאים</h1></div></div>
    <div id="subjects-list"></div>
  </div>

  <div id="page-tasks" class="page">
    <div class="page-header"><button class="btn btn-primary" onclick="openModal('m-task')">+ משימה חדשה</button><div class="page-title"><h1>משימות</h1></div></div>
    <div id="daily-list"></div>
  </div>

  <div id="page-exams" class="page">
    <div class="page-header"><button class="btn btn-primary" onclick="openModal('m-exam')">+ מבחן חדש</button><div class="page-title"><h1>מבחנים</h1></div></div>
    <div id="upcoming-exams"></div>
  </div>

  <div id="page-archive" class="page">
    <div class="page-header"><button class="btn btn-primary" onclick="openModal('m-archive')">+ לארכיון</button><div class="page-title"><h1>ארכיון ציונים</h1></div></div>
    <div id="archive-list"></div>
  </div>

  <div id="page-studytime" class="page">
    <div class="page-header"><div class="page-title"><h1>זמן לימוד</h1></div></div>
    <div id="logs-list"></div>
  </div>
</div>

<button id="ai-fab" onclick="toggleAI()">🤖</button>
<div id="ai-panel">
  <div class="ai-header"><button onclick="toggleAI()">✕</button><span>עוזר לימודים AI (Groq)</span></div>
  <div class="ai-messages" id="ai-messages">
    <div class="ai-msg bot">שלום! אני העוזר האישי שלך. אני מחובר לנתונים שלך ויכול לענות על כל שאלה עליהם.</div>
  </div>
  <div class="ai-input-row">
    <button class="ai-send" id="ai-send-btn" onclick="sendAI()">➤</button>
    <input type="text" class="ai-input" id="ai-input" placeholder="שאל אותי על הלימודים שלך...">
  </div>
</div>

<div class="modal-overlay" id="m-subject"><div class="modal"><h3>נושא חדש</h3><div class="fg"><label>שם</label><input class="fc" id="m-subj-name"></div><button class="btn btn-primary" onclick="addSubject()">הוסף</button><button class="btn btn-ghost" onclick="closeModal('m-subject')">ביטול</button></div></div>
<div class="modal-overlay" id="m-task"><div class="modal"><h3>משימה חדשה</h3><div class="fg"><label>תיאור</label><input class="fc" id="m-task-name"></div><button class="btn btn-primary" onclick="addTask()">הוסף</button><button class="btn btn-ghost" onclick="closeModal('m-task')">ביטול</button></div></div>
<div class="modal-overlay" id="m-exam"><div class="modal"><h3>מבחן חדש</h3><div class="fg"><label>שם</label><input class="fc" id="m-exam-name"></div><div class="fg"><label>תאריך</label><input class="fc" type="date" id="m-exam-date"></div><button class="btn btn-primary" onclick="addExam()">הוסף</button><button class="btn btn-ghost" onclick="closeModal('m-exam')">ביטול</button></div></div>
<div class="modal-overlay" id="m-archive"><div class="modal"><h3>הוספה לארכיון</h3><div class="fg"><label>שם המבחן</label><input class="fc" id="m-arc-name"></div><div class="fg"><label>ציון</label><input class="fc" type="number" id="m-arc-score"></div><div class="fg"><label>תאריך</label><input class="fc" type="date" id="m-arc-date"></div><button class="btn btn-primary" onclick="addArchiveEntry()">שמור</button><button class="btn btn-ghost" onclick="closeModal('m-archive')">ביטול</button></div></div>

<script>
'use strict';
// ═══════════════════════════════════════════
// AUTH & STATE
// ═══════════════════════════════════════════
const getUsers = () => JSON.parse(localStorage.getItem('sa_users') || '{}');
const saveUsers = u => localStorage.setItem('sa_users', JSON.stringify(u));
const userKey = u => 'sa_data_' + u;

let CU = null;
try { const s = localStorage.getItem('sa_session'); if(s) CU = JSON.parse(s); } catch(e){}

let S = {subjects:[], tasks:[], exams:[], logs:[], archive:[]};

function loadState(){
  if(!CU) return;
  S = JSON.parse(localStorage.getItem(userKey(CU.id)) || 'null') || {subjects:[], tasks:[], exams:[], logs:[], archive:[]};
}
function save(){ if(CU) localStorage.setItem(userKey(CU.id), JSON.stringify(S)); }

function switchAuthTab(t){
  document.getElementById('auth-login').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('auth-register').style.display = t === 'register' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach((el, i) => el.classList.toggle('active', (t==='login'&&i===0)||(t==='register'&&i===1)));
}

function doLogin(){
  const u = document.getElementById('l-user').value.trim(), p = document.getElementById('l-pass').value;
  const users = getUsers();
  if(users[u] && users[u].pw === btoa(p)){
    loginUser({id:u, name:u});
  } else { document.getElementById('l-err').textContent = 'פרטים שגויים'; }
}

function doRegister(){
  const u = document.getElementById('r-user').value.trim(), p = document.getElementById('r-pass').value;
  const users = getUsers();
  if(users[u]){ document.getElementById('r-err').textContent = 'קיים כבר'; return; }
  users[u] = {pw: btoa(p)};
  saveUsers(users); loginUser({id:u, name:u});
}

function loginUser(session){
  CU = session; localStorage.setItem('sa_session', JSON.stringify(session));
  loadState(); document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('sb-username').textContent = session.name;
  document.getElementById('sb-avatar').textContent = session.name[0].toUpperCase();
  showPage('dashboard');
}

function doLogout(){ CU = null; localStorage.removeItem('sa_session'); location.reload(); }

// ═══════════════════════════════════════════
// DATA LOGIC
// ═══════════════════════════════════════════
function uid(){ return Date.now().toString(36) + Math.random().toString(36).substr(2); }
function fmtDate(d){ return new Date(d).toLocaleDateString('he-IL'); }

function showPage(name){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if(name === 'dashboard') renderDash();
  if(name === 'subjects') renderSubjects();
  if(name === 'tasks') renderTasks();
  if(name === 'exams') renderExams();
  if(name === 'archive') renderArchive();
}

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function addSubject(){
  const n = document.getElementById('m-subj-name').value;
  if(n){ S.subjects.push({id:uid(), name:n, subtopics:[]}); save(); renderSubjects(); closeModal('m-subject'); }
}

function renderSubjects(){
  const el = document.getElementById('subjects-list'); if(!el) return;
  el.innerHTML = S.subjects.map(s => `<div class="exam-card"><span>${s.name}</span></div>`).join('');
}

function addTask(){
  const n = document.getElementById('m-task-name').value;
  if(n){ S.tasks.push({id:uid(), name:n, done:false}); save(); renderTasks(); closeModal('m-task'); }
}

function renderTasks(){
  const el = document.getElementById('daily-list'); if(!el) return;
  el.innerHTML = S.tasks.map(t => `<div class="task-row"><span>${t.name}</span><div class="task-circle ${t.done?'done':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</div></div>`).join('');
}

function toggleTask(id){
  const t = S.tasks.find(x => x.id === id); if(t){ t.done = !t.done; save(); renderTasks(); }
}

function addExam(){
  const n = document.getElementById('m-exam-name').value, d = document.getElementById('m-exam-date').value;
  if(n && d){ S.exams.push({id:uid(), name:n, date:d}); save(); renderExams(); closeModal('m-exam'); }
}

function renderExams(){
  const el = document.getElementById('upcoming-exams'); if(!el) return;
  el.innerHTML = S.exams.map(e => `<div class="exam-card"><div>${e.name}</div><div>${fmtDate(e.date)}</div></div>`).join('');
}

function addArchiveEntry(){
  const n = document.getElementById('m-arc-name').value, s = document.getElementById('m-arc-score').value, d = document.getElementById('m-arc-date').value;
  if(n && d){ S.archive.push({id:uid(), name:n, score:s, date:d}); save(); renderArchive(); closeModal('m-archive'); }
}

function renderArchive(){
  const el = document.getElementById('archive-list'); if(!el) return;
  el.innerHTML = S.archive.map(a => `<div class="exam-card"><div style="font-weight:700;color:var(--g)">${a.score}</div><div>${a.name}</div></div>`).join('');
}

function renderDash(){
  document.getElementById('dash-date').textContent = new Date().toLocaleDateString('he-IL', {weekday:'long', day:'2-digit', month:'2-digit'});
  document.getElementById('s-subjects').textContent = S.subjects.length;
}

// ═══════════════════════════════════════════
// AI CHAT (Groq + Context)
// ═══════════════════════════════════════════
const AI_API_KEY = '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';
const AI_MODEL   = 'llama-3.3-70b-versatile';
const AI_URL     = 'https://api.groq.com/openai/v1/chat/completions';

let aiOpen = false, aiHistory = [], aiTyping = false;

function toggleAI(){
  aiOpen = !aiOpen;
  document.getElementById('ai-panel').classList.toggle('open', aiOpen);
}

function buildContext() {
  if (!S) return "אין נתונים.";
  let lines = ["=== נתוני האפליקציה של המשתמש ==="];
  lines.push(`שם המשתמש: ${CU ? CU.name : 'לא ידוע'}`);
  lines.push("\n-- נושאים --");
  S.subjects.forEach(s => lines.push(`- ${s.name}`));
  lines.push("\n-- משימות פתוחות --");
  S.tasks.filter(t => !t.done).forEach(t => lines.push(`- ${t.name}`));
  lines.push("\n-- מבחנים קרובים --");
  S.exams.forEach(e => lines.push(`- ${e.name} ב-${fmtDate(e.date)}`));
  lines.push("\n-- ארכיון ציונים --");
  S.archive.forEach(a => lines.push(`- ${a.name}: ציון ${a.score}`));
  return lines.join("\n");
}

async function sendAI(){
  if(aiTyping) return;
  const input = document.getElementById('ai-input'), q = input.value.trim();
  if(!q) return;

  input.value = ''; addAIMsg(q, 'user');
  const thinkingEl = addAIMsg('מעבד נתונים...', 'bot thinking');
  aiTyping = true; document.getElementById('ai-send-btn').disabled = true;

  const context = buildContext();
  aiHistory.push({role:'user', content: q});

  try {
    const response = await fetch(AI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${AI_API_KEY}` },
      body: JSON.stringify({
        model: AI_MODEL,
        messages: [
          {role: 'system', content: `אתה עוזר לימודים אישי חכם. ענה בעברית קצרה, אדיבה ומדויקת. השתמש רק בנתונים הבאים מהאפליקציה:\n${context}`},
          ...aiHistory.slice(-6)
        ],
        temperature: 0.3
      })
    });

    const data = await response.json();
    thinkingEl.remove();
    
    if(data.error) throw new Error(data.error.message);
    
    const text = data.choices[0].message.content;
    addAIMsg(text, 'bot');
    aiHistory.push({role:'assistant', content: text});
  } catch(e) {
    thinkingEl.remove();
    addAIMsg(`שגיאה: ${e.message}`, 'bot');
  } finally {
    aiTyping = false; document.getElementById('ai-send-btn').disabled = false;
  }
}

function addAIMsg(text, classes){
  const el = document.createElement('div');
  el.className = 'ai-msg ' + classes; el.textContent = text;
  const msgs = document.getElementById('ai-messages');
  msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
  return el;
}

if(CU) loginUser(CU);
</script>
