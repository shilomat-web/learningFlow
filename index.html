<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2ecc8b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="מרכז למידה">
<title>מרכז למידה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#2ecc8b;--gl:#e8f8f2;--gm:#c0eedd;--gd:#1aad6e;
  --bg:#f5f5f3;--white:#fff;--border:#e8e8e5;
  --txt:#1a1a1a;--sec:#888;--muted:#bbb;
  --red:#e74c3c;--amber:#f39c12;--sidebar:200px;
  --shadow:0 1px 4px rgba(0,0,0,.07);
  --r:12px;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;overflow-x:hidden}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
#auth-screen.hidden{display:none}
.auth-box{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:380px;max-width:92vw;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:right}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-bottom:28px}
.logo-icon{width:40px;height:40px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.auth-logo h1{font-size:22px;font-weight:700}
.auth-tabs,.tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px}
.auth-tab,.tab{flex:1;padding:9px;text-align:center;font-size:14px;cursor:pointer;border-radius:7px;transition:all .15s;color:var(--sec);font-family:'Heebo',sans-serif}
.auth-tab.active,.tab.active{background:var(--white);color:var(--txt);font-weight:500;box-shadow:var(--shadow)}
.auth-err{font-size:12px;color:var(--red);margin-top:6px;min-height:16px;text-align:right}

/* ── SIDEBAR (Left Aligned) ── */
#sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-logo-row{display:flex;align-items:center;gap:8px;justify-content:flex-start}
.sb-logo-row h2{font-size:15px;font-weight:700}
.sb-logo p{font-size:11px;color:var(--sec);margin-top:2px;text-align:right}
nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;justify-content:flex-start;flex-direction:row-reverse;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:var(--sec);transition:all .15s;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--txt)}
.nav-item.active{background:var(--gl);color:var(--g);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}
.user-badge{display:flex;align-items:center;flex-direction:row-reverse;gap:8px;padding:10px 14px;cursor:pointer;border-top:1px solid var(--border);font-size:13px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.logout-btn{margin-right:auto;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Heebo',sans-serif}
.logout-btn:hover{color:var(--red)}

/* ── MAIN ── */
#main{margin-left:var(--sidebar);flex:1;padding:32px 40px;min-height:100vh}
.page{display:none}
.page.active{display:block}
.page-header{display:flex;flex-direction:row-reverse;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.page-title h1{font-size:26px;font-weight:700}
.page-title p{font-size:13px;color:var(--sec);margin-top:3px}
.header-actions{display:flex;flex-direction:row-reverse;gap:8px;align-items:center}

/* ── BUTTONS & CARDS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-family:'Heebo',sans-serif;cursor:pointer;border:none;transition:all .15s;user-select:none}
.btn-primary{background:var(--g);color:#fff}
.btn-primary:hover{background:var(--gd)}
.btn-ghost{background:transparent;color:var(--sec);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}

/* ── DASHBOARD ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1.4fr;gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:right}
.stat-label{font-size:12px;color:var(--sec);display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-bottom:10px}
.stat-value{font-size:28px;font-weight:700}
.stat-card.progress-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;grid-row:span 2}
.circle-progress{position:relative;width:120px;height:120px}
.circle-progress svg{transform:rotate(-90deg)}
.circle-value{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.circle-value .pct{font-size:26px;font-weight:700}
.circle-value .lbl{font-size:11px;color:var(--sec)}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;text-align:right}

/* ── TASK & EXAM ROWS ── */
.task-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:13px;position:relative;overflow:hidden;}
.task-row-right{display:flex;align-items:center;gap:10px}
.task-circle{width:20px;height:20px;border-radius:50%;border:2px solid var(--g);flex-shrink:0;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.task-circle.done{background:var(--g);border-color:var(--g)}
.task-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--gl);color:var(--g);font-weight:500}
.task-due{font-size:11px;color:var(--sec)}
.exam-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.exam-card-right{display:flex;align-items:center;gap:12px}
.exam-icon{width:36px;height:36px;border-radius:8px;background:var(--gl);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.exam-name{font-size:14px;font-weight:500}
.exam-date{font-size:12px;color:var(--sec);margin-top:2px}
.exam-score{font-size:13px;font-weight:600;padding:4px 10px;border-radius:20px}
.exam-score.green{color:var(--g);background:var(--gl)}
.exam-score.amber{color:var(--amber);background:#fef3cd}
.exam-score.red{color:var(--red);background:#fdecea}
.countdown-badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--gl);color:var(--g)}
.countdown-badge.urgent{background:#fdecea;color:var(--red)}

/* ── SUBJECTS ── */
.subjects-list{display:flex;flex-direction:column;gap:10px}
.subject-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.subject-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;transition:background .1s}
.subject-header:hover{background:var(--bg)}
.subject-right{display:flex;align-items:center;gap:12px}
.subject-name{font-size:15px;font-weight:600}
.subject-meta{font-size:12px;color:var(--sec);margin-top:2px}
.subject-left{display:flex;align-items:center;gap:12px}
.subject-pct{font-size:13px;color:var(--sec);min-width:32px;text-align:left}
.subject-bar{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.subject-bar-fill{height:100%;background:var(--g);border-radius:3px;transition:width .3s}
.chevron{transition:transform .2s;font-size:12px;color:var(--sec)}
.chevron.open{transform:rotate(180deg)}
.sub-topics{display:none;border-top:1px solid var(--border);padding:8px 20px}
.sub-topics.open{display:block}
.sub-topic-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:8px;font-size:13px;transition:background .1s}
.sub-topic-item:hover{background:var(--bg)}
.sub-topic-right{display:flex;align-items:center;gap:8px}
.sub-dot{width:6px;height:6px;border-radius:50%;background:var(--gm);flex-shrink:0}
.add-sub-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sec);padding:5px 10px;border-radius:6px;cursor:pointer;border:none;background:transparent;font-family:'Heebo',sans-serif;}
.add-sub-btn:hover{background:var(--bg);color:var(--txt)}
.done-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--g);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.done-check.done{background:var(--g)}

/* ── STUDY TIME ── */
.time-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.time-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;text-align:right}
.time-stat-lbl{font-size:12px;color:var(--sec);margin-bottom:6px}
.time-stat-val{font-size:22px;font-weight:700}
.view-toggle{display:flex;gap:4px;margin-bottom:16px;flex-direction:row-reverse}
.view-btn{padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--sec);font-family:'Heebo',sans-serif;}
.view-btn.active{background:var(--gl);color:var(--g);border-color:var(--gm)}
.log-row{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px}
.log-dur{font-size:18px;font-weight:700}
.log-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--gl);color:var(--g);font-weight:500}
.log-date{font-size:11px;color:var(--sec)}
.chart-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.bars{display:flex;align-items:flex-end;gap:8px;height:120px;margin-top:12px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.bar-wrap:hover .bar{background:var(--g)}
.bar{width:100%;background:var(--gm);border-radius:4px 4px 0 0;min-height:4px;transition:background .15s}
.bar-lbl{font-size:10px;color:var(--sec)}
.subj-chart{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.subj-bar-row{display:flex;align-items:center;gap:12px}
.subj-bar-lbl{width:90px;font-size:12px;color:var(--sec);text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.subj-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.subj-bar-fill{height:100%;background:var(--g);border-radius:4px}
.subj-bar-val{font-size:12px;color:var(--sec);width:52px;text-align:left;flex-shrink:0}

/* ── CALENDAR ── */
.cal-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-nav{display:flex;gap:8px}
.cal-nav-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-day-name{padding:10px;text-align:center;font-size:12px;color:var(--sec);font-weight:500}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:76px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;}
.cal-day:nth-child(7n){border-right:none}
.cal-day.other-month .cal-day-num{color:var(--muted)}
.cal-day-num{font-size:12px;font-weight:500;margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-day.today .cal-day-num{background:var(--g);color:#fff;font-weight:700}
.cal-ev{font-size:9px;padding:1px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-ev.exam{background:#fef3cd;color:#92400e}
.cal-ev.task{background:var(--gl);color:#065f46}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px;padding:28px;width:460px;max-width:100%;box-shadow:0 8px 40px rgba(0,0,0,.18);animation:slideUp .2s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:18px;font-weight:600;margin-bottom:20px;text-align:right}
.fg{margin-bottom:16px;text-align:right}
.fg label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.fc{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'Heebo',sans-serif;direction:rtl;background:var(--white);outline:none;transition:border-color .15s}
.fc:focus{border-color:var(--g)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;flex-direction:row-reverse;gap:10px;justify-content:flex-start;margin-top:24px}

/* ── POMODORO ── */
#pomodoro-fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--g);color:#fff;font-size:24px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(46,204,139,.5);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}
#pomodoro-fab:hover{transform:scale(1.08)}
#pomodoro-fab.running{background:#e74c3c;box-shadow:0 4px 16px rgba(231,76,60,.5);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.pomo-ring{width:160px;height:160px;margin:0 auto 20px;position:relative}
.pomo-ring svg{transform:rotate(-90deg)}
.pomo-time{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:700}
.pomo-label{font-size:13px;color:var(--sec);margin-bottom:4px}
.pomo-phase{font-size:15px;font-weight:600;margin-bottom:20px}
.pomo-controls{display:flex;gap:12px;justify-content:center;margin-bottom:16px}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:2000;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── AI CHAT ── */
#ai-fab{position:fixed;bottom:100px;left:24px;width:54px;height:54px;border-radius:50%;background:var(--g);color:#fff;font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(46,204,139,.55);z-index:9000;display:flex !important;align-items:center;justify-content:center;}
#ai-panel{position:fixed;bottom:0;left:0;width:380px;height:560px;max-width:100vw;max-height:85vh;background:var(--white);border-radius:0 20px 0 0;box-shadow:4px -4px 32px rgba(0,0,0,.15);z-index:8999;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
#ai-panel.open{transform:translateY(0)}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0; flex-direction:row-reverse;}
.ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.ai-msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.ai-msg.user{background:var(--g);color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.ai-msg.bot{background:var(--bg);color:var(--txt);align-self:flex-start;border-radius:14px 14px 14px 4px;border:1px solid var(--border)}
.ai-input-row{display:flex;flex-direction:row-reverse;gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.ai-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:'Heebo',sans-serif;outline:none;direction:rtl;resize:none;height:40px;}

@media(max-width:640px){
  #sidebar{display:none}
  #mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);z-index:100;height:62px;}
  .mob-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9px;color:var(--muted);cursor:pointer;}
  .mob-item.active{color:var(--g)}
  .mob-item svg{width:22px;height:22px}
  #main{margin-left:0;padding:16px 14px 80px}
  .page-header{flex-direction:column-reverse;gap:12px}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-row"><h2>מרכז למידה</h2><div class="logo-icon" style="width:32px;height:32px;font-size:16px">📚</div></div>
    <p>ניהול משימות לימודים</p>
  </div>
  <nav id="sidebar-nav">
    <div class="nav-item active" onclick="showPage('dashboard')"><span>ראשי</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div>
    <div class="nav-item" onclick="showPage('subjects')"><span>נושאים</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
    <div class="nav-item" onclick="showPage('tasks')"><span>משימות</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
    <div class="nav-item" onclick="showPage('calendar')"><span>לוח שנה</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <div class="nav-item" onclick="showPage('exams')"><span>מבחנים</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></div>
    <div class="nav-item" onclick="showPage('studytime')"><span>זמן לימוד</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
  </nav>
</div>

<button id="pomodoro-fab" onclick="openPomo()">🍅</button>
<div class="toast" id="toast"></div>

<div id="main">

<div id="page-dashboard" class="page active">
  <div class="page-header">
    <div class="page-title"><h1>מרכז למידה</h1><p id="dash-date"></p></div>
    <div></div>
  </div>
  <div class="stats-grid" id="main-stats">
    </div>
</div>

<div id="page-tasks" class="page">
  <div class="page-header">
    <div class="page-title"><h1>משימות</h1><p>משימות לביצוע ולו"ז</p></div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openModal('m-task')">+ משימה חדשה</button>
    </div>
  </div>
  <div class="tabs" style="margin-bottom:20px; flex-direction:row-reverse">

  <div class="modal">
    <h3>רישום זמן לימוד</h3>
    <div class="fg"><label>נושא</label><select class="fc" id="m-log-subj"></select></div>
    
    <label style="font-size:13px; font-weight:500; display:block; margin-bottom:6px">הזנה מהירה</label>

      <button type="button" class="btn btn-ghost" onclick="setLogTime(1,0)">שעה</button>
      <button type="button" class="btn btn-ghost" onclick="setLogTime(1,30)">שעה וחצי</button>

    <div class="fr">

<div class="modal-overlay pomo-modal" id="m-pomo">
  <div class="modal" style="text-align:center;max-width:340px">
    <div class="pomo-label" id="pomo-label">עבודה</div>
    <div class="pomo-time" id="pomo-time" style="position:static; transform:none; margin:20px 0;">25:00</div>
    <div class="pomo-controls">
      <button class="btn btn-primary" id="pomo-start-btn" onclick="pomoBtnClick()">▶ התחל</button>
      <button class="btn btn-ghost" onclick="pomoReset()">↺ אפס</button>
    </div>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:4px" onclick="closeModal('m-pomo')">סגור</button>
  </div>
</div>

</div>

<script>
// --- CORE LOGIC ADDITIONS ---
let currentTaskTab = 'daily';
let timeTabRange = 'all'; // 'all', 'month', 'week'

// 1. Audio Beep Function
function playBeep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.3); // Short pleasant beep
    } catch(e) { console.log("Audio not supported"); }
}

// 2. Notifications Logic
if ("Notification" in window && Notification.permission !== "denied") {
    Notification.requestPermission();
}

setInterval(() => {
    if(!S || !S.tasks) return;
    const now = new Date();
    const dStr = now.toISOString().split('T')[0];
    const tStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    
    S.tasks.forEach(t => {
        if(!t.done && t.dueDate === dStr && t.dueTime === tStr && !t.notified) {
            if(Notification.permission === 'granted') new Notification('מרכז למידה: תזכורת', {body: t.name});
            showToast('⏰ תזכורת למשימה: ' + t.name);
            t.notified = true;
            save();
        }
    });
}, 60000); // Check every minute

// 3. Pomodoro sound update
function pomoTick(){
  pomoState.phaseElapsed++; pomoState.totalElapsed++;
  const limit = pomoState.phase==='work' ? WORK : BREAK;
  if(pomoState.phaseElapsed >= limit){
    playBeep(); // PLAY SOUND HERE
    clearInterval(pomoState.timer); pomoState.running=false;
    document.getElementById('pomodoro-fab').classList.remove('running');
    if(pomoState.phase==='work'){
      pomoState.phase='break'; pomoState.phaseElapsed=0;
      showToast('זמן הפסקה! 5 דקות ☕');
    }else{
      pomoState.phase='work'; pomoState.phaseElapsed=0;
      showToast('חזרה לעבודה! 25 דקות 💪');
    }
  }
  renderPomo();
}

// 4. Time Modals & Quick Buttons
function setLogTime(h, m) {
    document.getElementById('m-log-h').value = h;
    document.getElementById('m-log-m').value = m;
}

function showDayLogs(dateStr) {
    const logs = S.logs.filter(l => l.date === dateStr);
    const content = document.getElementById('day-logs-content');
    document.getElementById('day-logs-title').textContent = 'פירוט למידה - ' + fmtDate(dateStr);
    
    if(logs.length === 0) {
        content.innerHTML = '<div class="empty">לא נרשמה למידה ביום זה.</div>';
    } else {
        let bySubj = {};
        logs.forEach(l => { bySubj[l.subjId] = (bySubj[l.subjId] || 0) + l.minutes; });
        content.innerHTML = Object.entries(bySubj).map(([sid, m]) => {
            const s = S.subjects.find(sub => sub.id === sid);
            return `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border)">
                <span>${s ? s.name : 'נושא לא ידוע'}</span>
                <strong>${fmtMins(m)}</strong>
            </div>`;
        }).join('');
    }
    openModal('m-day-logs');
}

// 5. Updated Time Chart for Cumulative stats
function setTimeTab(el, range) {
    timeTabRange = range;
    el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderTimeChart();
}

function renderTimeChart(){
  const el=document.getElementById('time-chart'); if(!el) return;
  if(timeView==='h'){
    document.getElementById('time-filter-tabs').style.display = 'none'; // hide range filters for daily bar
    const days=[];
    for(let i=6;i>=0;i--){
        const d=new Date(); d.setDate(d.getDate()-i); 
        const ds=d.toISOString().split('T')[0];
        const m=S.logs.filter(l=>l.date===ds).reduce((s,l)=>s+l.minutes,0);
        days.push({lbl:d.toLocaleDateString('he-IL',{weekday:'short'}), m, ds});
    }
    const mx=Math.max(...days.map(d=>d.m), 60);
    el.innerHTML=`<div class="chart-wrap"><div class="bars">${days.map(d=>`<div class="bar-wrap" onclick="showDayLogs('${d.ds}')"><div class="bar" style="height:${Math.round(d.m/mx*100)}px" title="${fmtMins(d.m)}"></div><div class="bar-lbl">${d.lbl}</div></div>`).join('')}</div></div>`;
  }else{
    document.getElementById('time-filter-tabs').style.display = 'flex';
    let filteredLogs = S.logs;
    if(timeTabRange === 'week') {
        const d7 = new Date(); d7.setDate(d7.getDate()-7);
        filteredLogs = S.logs.filter(l => new Date(l.date) >= d7);
    } else if (timeTabRange === 'month') {
        const d30 = new Date(); d30.setDate(d30.getDate()-30);
        filteredLogs = S.logs.filter(l => new Date(l.date) >= d30);
    }
    const bys={}; filteredLogs.forEach(l=>{bys[l.subjId]=(bys[l.subjId]||0)+l.minutes;});
    const entries=Object.entries(bys).sort((a,b)=>b[1]-a[1]); const mx=entries[0]?entries[0][1]:1;
    el.innerHTML=`<div class="chart-wrap"><div class="subj-chart">${entries.map(([sid,m])=>{const n=S.subjects.find(s=>s.id===sid)?.name||'?';return`<div class="subj-bar-row"><div class="subj-bar-val">${fmtMins(m)}</div><div class="subj-bar-track"><div class="subj-bar-fill" style="width:${Math.round(m/mx*100)}%"></div></div><div class="subj-bar-lbl">${n}</div></div>`}).join('')||'<div class="empty">אין נתונים בטווח זה</div>'}</div></div>`;
  }
}

// 6. Updated Tasks Logic
function switchTaskTab(type) {
    currentTaskTab = type;
    document.querySelectorAll('#page-tasks .tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    renderTasks();
}

function renderTasks() {
    const list = S.tasks.filter(t => t.type === currentTaskTab);
    const el = document.getElementById('task-list-container');
    if(!list.length) { el.innerHTML = '<div class="empty">אין משימות בקטגוריה זו</div>'; return; }
    el.innerHTML = list.map(t => {
        const s = S.subjects.find(sub => sub.id === t.subjId);
        const due = t.dueDate ? `${fmtDate(t.dueDate)} ${t.dueTime||''}` : '';
        return `<div class="task-row">
            <div style="display:flex; gap:8px;">${due?`<span class="task-due">${due}</span>`:''}${s?`<span class="task-tag">${s.name}</span>`:''}</div>
            <div class="task-row-right">
                <span style="${t.done?'text-decoration:line-through':''}">${t.name}</span>
                <div class="task-circle${t.done?' done':''}" onclick="toggleTask('${t.id}')"></div>
            </div>
        </div>`;
    }).join('');
}
</script>
